context:
  version: "0.22.0"

package:
  name: pylangacq
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pylangacq/pylangacq-${{ version }}.tar.gz
  sha256: 35eb88ee2cb9c1ccd27c0ba01316409d089c609424cad2a2be49ef8657a676f2

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - rustling >=0.7.0

tests:
  - python:
      imports:
        - pylangacq
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pylangacq.org
  summary: Language Acquisition Research in Python
  license: MIT
  license_file: LICENSE.txt
  documentation: https://pylangacq.org
  repository: https://github.com/jacksonllee/pylangacq

extra:
  recipe-maintainers:
    - jacksonllee
